schemaVersion: 1.0.0
name: pragmatic-programmer
displayName: The Pragmatic Programmer
description: >-
  Aplicar principios do Programador Pragmatico de Hunt e Thomas. Use para tomar
  decisoes tecnicas defensaveis, evitar duplicacao, automatizar rotinas e manter
  codigo adaptavel.
triggers:
  - pragmatic programmer
  - dry
  - tracer bullets
  - orthogonality
  - technical debt
  - automation
  - good enough software
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Auditar violacoes de DRY — conhecimento duplicado em codigo, docs e schema.
  - step: 2
    action: Verificar orthogonalidade — mudanca em um modulo afeta outros?
  - step: 3
    action: Identificar processos manuais repetitivos e criar scripts de automacao.
  - step: 4
    action: Revisar encapsulamento de dependencias externas em adapters.
  - step: 5
    action: Documentar divida tecnica intencional com plano de pagamento.
outputContract:
  - Lista de violacoes DRY e plano de consolidacao.
  - Mapa de acoplamento entre modulos.
  - Scripts de automacao criados ou planejados.
  - Registro de divida tecnica com contexto.
