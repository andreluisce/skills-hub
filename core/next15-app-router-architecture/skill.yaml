schemaVersion: 1.0.0
name: next15-app-router-architecture
displayName: Next.js 15 App Router Architecture
description: "Define and refatorar architecture in Next.js 15+ App Router with Server\
  \ Components-first, boundaries Client, streaming and cache orientado a dom\xEDnio\
  \ for apps React 19+ in monorepo."
triggers:
- nextjs 15
- app router
- server components
- streaming
- route architecture
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Map routes, dynamic segments and page rendering requirements.
- step: 2
  action: Define Server vs Client boundaries by responsibility and cost of hydration.
- step: 3
  action: Design strategy of cache and revalidation by domain of data.
- step: 4
  action: Estruturar loaders, actions and errorr boundaries by segmento.
- step: 5
  action: Validate performance with Web Vitals and render profile in real browsing.
outputContract:
- Mapa of rotas and boundaries Server/Client.
- Caching/revalidation decisions by domain.
- Implementation plan by segment.
- Checklist of performance and regression.
