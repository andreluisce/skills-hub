schemaVersion: 1.0.0
name: shadcn-dark-design
displayName: Shadcn Dark Design
description: >-
  Skill para criacao de interfaces usando shadcn/ui com foco em Tema Escuro. Use
  para customizar componentes, gerenciar variaveis CSS e garantir contraste
  acessivel em dark mode.
triggers:
  - shadcn dark
  - dark mode
  - dark theme
  - css variables
  - globals.css
  - accessible contrast
  - dark ui
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Definir todos os tokens semanticos em globals.css sob :root e .dark.
  - step: 2
    action: Auditar componentes por uso de cores hardcoded fora de tokens.
  - step: 3
    action: Verificar contraste minimo WCAG AA em texto e elementos interativos.
  - step: 4
    action: Garantir foco visivel em todos os elementos focaveis em dark mode.
  - step: 5
    action: Testar componentes em Chrome, Firefox e Safari em dark mode.
outputContract:
  - Catalogo de tokens semanticos definidos.
  - Lista de violacoes de hardcoded color.
  - Relatorio de contraste por componente critico.
  - Checklist de acessibilidade em dark mode.
