schemaVersion: 1.0.0
name: ux-lean-experimentation
displayName: UX Lean Experimentation
description: Strategist of Lean UX and continuous validation based on Gothelf and
  Seiden. Use to transform backlog into testable hypotheses, define MVPs of learning,
  and guide products by measurable outcomes.
triggers:
- lean ux
- hypothesis
- mvp
- experimentation
- a/b test
- product validation
- outcomes over outputs
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Converter item of backlog in hypothesis with problema, persona e metric.
- step: 2
  action: Define the minimum solution that tests the hypothesis with the lowest cost.
- step: 3
  action: Estabelecer metric primaria e of guarda with janela of observacao.
- step: 4
  action: Executar experimento with colaboracao cross-functional desde o inicio.
- step: 5
  action: 'Evaluate result and decide: continue, pivot or discard.'
outputContract:
- Hypothesis Cards by item of backlog.
- Metricas primarias e of guarda by experimento.
- Plano of discovery continuous.
- Relatorio of aprendizado by ciclo.
