schemaVersion: 1.0.0
name: ux-ethics-bias
displayName: UX Ethics and Cognitive Bias
description: Specialist in cognitive biases, positive friction, and dark-pattern prevention.
  Use to protect user autonomy without sacrificing product clarity.
triggers:
- dark patterns
- cognitive bias
- ethics
- positive friction
- ux ethics
- manipulation
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Audit flows for dark patterns and exploitative bias tactics.
- step: 2
  action: Classificar risco etico by acao (baixo, medio, alto impacto).
- step: 3
  action: Define positive friction for irreversible or sensitive actions.
- step: 4
  action: Revisar copy of consentimento for linguagem clara e explicita.
- step: 5
  action: Validate that the user has a clear path to opting out without punishment.
outputContract:
- Bias audit by flow.
- Matriz of risco etico by acao.
- Plano of friccao positiva for actions criticas.
- Lista of ajustes of copy for consentimento explicito.
