schemaVersion: 1.0.0
name: react-patterns
displayName: React Patterns
description: >-
  Skill para padroes avancados de React. Use para gerenciamento de estado
  global, hooks customizados para formularios complexos e otimizacao de
  renderizacao com Zustand, React Hook Form, Zod e Framer Motion.
triggers:
  - react patterns
  - zustand
  - custom hooks
  - render optimization
  - react hook form
  - zod
  - framer motion
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Classificar estado por escopo (local, feature, global, servidor).
  - step: 2
    action: Implementar formularios com React Hook Form + Zod sincronizado com schema do banco.
  - step: 3
    action: Extrair logica de dominio para custom hooks com responsabilidade unica.
  - step: 4
    action: Otimizar renders com memo/callback apenas onde profiling confirmar custo.
  - step: 5
    action: Adicionar micro-animacoes com Framer Motion para feedback de interacao.
outputContract:
  - Mapa de estado por escopo e ferramenta.
  - Contratos de formulario com validacao Zod.
  - Catalogo de hooks de dominio.
  - Plano de otimizacao de render com evidencia.
