schemaVersion: 1.0.0
name: nextjs-mastery
displayName: Next.js Mastery
description: >-
  Skill para desenvolvimento avancado com Next.js 15+ App Router. Use para
  gerenciar Server/Client Components, otimizacao de rotas dinamicas, streaming
  e fetching de dados com cache por dominio.
triggers:
  - nextjs mastery
  - server components
  - app router
  - dynamic routes
  - data fetching
  - revalidation
  - next.js advanced
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Mapear rotas e classificar cada pagina como Server ou Client Component.
  - step: 2
    action: Definir estrategia de cache e revalidacao por dominio de dado.
  - step: 3
    action: Implementar error boundaries e loading states por segmento de rota.
  - step: 4
    action: Otimizar data fetching com parallel fetch e React cache().
  - step: 5
    action: Medir performance com Web Vitals e bundle analyzer.
outputContract:
  - Mapa de rotas com classificacao Server/Client.
  - Matriz de cache e revalidacao por dominio.
  - Plano de error/loading boundaries.
  - Relatorio de performance e bundle.
