schemaVersion: 1.0.0
name: react-frontend-architecture-2026
displayName: React Frontend Architecture 2026
description: Architect and refactor frontend with Next.js 15+, React 19+, TanStack
  Query, shadcn/ui and monorepo, focused on domain boundaries, contracts between packages
  and evolutionary quality.
triggers:
- architecture frontend
- nextjs 15
- react 19
- tanstack query
- shadcn
- monorepo
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Classify context of product, risk and limits of domain.
- step: 2
  action: Define blueprint with boundaries and contracts by package.
- step: 3
  action: Escolher strategy RSC/Client and cache of data in TanStack Query.
- step: 4
  action: Implementar with SOLID, KISS, DRY and rules of governance in monorepo.
- step: 5
  action: Validate with technical audit, metrics and incremental plan.
outputContract:
- Objective diagnosis of the current state.
- Target architecture by modules and packages.
- Plan the migration in small steps.
- Quality and observability criteria.
- Tradeoffs and riscos aceitos.
