schemaVersion: 1.0.0
name: tanstack-query-governance
displayName: TanStack Query Governance
description: "Define governance of estado of servidor with TanStack Query in React\
  \ 19+, including query keys, staleTime, invalidation, optimistic updates and pol\xED\
  ticas of error/retry for apps Next.js 15+ in monorepo."
triggers:
- tanstack query
- query keys
- invalidation
- optimistic update
- server state
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Classify domains of data by volatility and criticality.
- step: 2
  action: Standardize convention of query keys and ownership by package.
- step: 3
  action: Define staleTime, gcTime and rules of invalidation by evento.
- step: 4
  action: Especificar optimistic updates, rollback and tratamento of error.
- step: 5
  action: Monitor refetch rate, perceived latency and failures.
outputContract:
- Matrix of domains of data and policy of cache.
- Official convention of query keys.
- Rules of invalidation and optimistic update.
- Indicadores of qualidade of server state.
