schemaVersion: 1.0.0
name: tanstack-query-governance
displayName: TanStack Query Governance
description: >-
  Definir governança de estado de servidor com TanStack Query em React 19+,
  incluindo query keys, staleTime, invalidação, optimistic updates e políticas
  de erro/retry para apps Next.js 15+ em monorepo.
triggers:
  - tanstack query
  - query keys
  - invalidation
  - optimistic update
  - server state
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Classificar domínios de dados por volatilidade e criticidade.
  - step: 2
    action: Padronizar convenção de query keys e ownership por pacote.
  - step: 3
    action: Definir staleTime, gcTime e regras de invalidação por evento.
  - step: 4
    action: Especificar optimistic updates, rollback e tratamento de erro.
  - step: 5
    action: Monitorar taxa de refetch, latência percebida e falhas.
outputContract:
  - Matriz de domínios de dados e política de cache.
  - Convenção oficial de query keys.
  - Regras de invalidação e update otimista.
  - Indicadores de qualidade de server state.
