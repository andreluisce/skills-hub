schemaVersion: 1.0.0
name: cms-dev-standards
displayName: CMS Development Standards
description: >-
  Manter padroes tecnicos do projeto. Use para garantir tema escuro, evitar
  textos hardcoded, gerenciar tipos do Supabase e operar o monorepo com
  pnpm/turbo.
triggers:
  - dev standards
  - dark theme
  - hardcoded text
  - supabase types
  - monorepo standards
  - code standards
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Auditar componentes por uso de cores hardcoded e textos fixos.
  - step: 2
    action: Verificar que todos os tipos de entidade usam Tables<'...'> gerados.
  - step: 3
    action: Confirmar que logica de fetch reside em pacote api-client, nao em apps.
  - step: 4
    action: Validar commits com padrao semantic atomic.
  - step: 5
    action: Executar deploy via script padronizado e verificar health checks.
outputContract:
  - Relatorio de violacoes de padroes por arquivo.
  - Lista de textos hardcoded para externalizar.
  - Mapa de tipos locais para migrar para gerados.
  - Checklist pre-deploy.
