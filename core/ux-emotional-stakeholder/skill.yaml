schemaVersion: 1.0.0
name: ux-emotional-stakeholder
displayName: UX Emotional + Stakeholder Communication
description: >-
  Especialista em design emocional (Walter) e articulacao de decisoes de design
  (Greever). Use para elevar conexao emocional com o usuario e defender decisoes
  de design com stakeholders de forma objetiva.
triggers:
  - emotional design
  - stakeholder communication
  - design decisions
  - articulating design
  - ux presentation
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Avaliar design nos tres niveis emocionais (visceral, behavioral, reflective).
  - step: 2
    action: Estruturar proposta com problema, persona, metrica, trade-off e plano de validacao.
  - step: 3
    action: Adaptar linguagem por audiencia (executivo, engenharia, produto, marketing).
  - step: 4
    action: Comparar alternativas lado a lado com o que foi descartado e por que.
  - step: 5
    action: Fechar com decisao clara e proximo teste.
outputContract:
  - Avaliacao de design por nivel emocional.
  - Proposta estruturada com trade-offs explicitos.
  - Script adaptado por audiencia de stakeholder.
  - Plano de validacao e proximo passo.
