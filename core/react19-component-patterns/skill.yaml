schemaVersion: 1.0.0
name: react19-component-patterns
displayName: React 19 Component Patterns
description: Apply advanced patterns of React 19+ components to reduce coupling, improve
  composition and eliminate anti-patterns in scalable interfaces with shadcn/ui and
  domain-oriented architecture.
triggers:
- react 19
- component patterns
- anti patterns
- refactor components
- composition
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Audit critical components and identify recurring anti-patterns.
- step: 2
  action: Separate presentation, orchestration and rules of domain.
- step: 3
  action: Apply composition with explicit contracts of props and states.
- step: 4
  action: Consolidate standards of accessibility and feedback of interaction.
- step: 5
  action: Define plan of incremental refactoring with criteria of acceptance.
outputContract:
- "Diagn\xF3stico of anti-patterns by component."
- Target pattern of composition and contracts.
- Batch refactoring strategy.
- Criteria of accessibility and consistency.
