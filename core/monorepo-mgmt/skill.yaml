schemaVersion: 1.0.0
name: monorepo-mgmt
displayName: Monorepo Management
description: >-
  Skill de orquestracao do monorepo. Use para gerenciar a relacao entre apps e
  pacotes como api-client, ui e monitoring via turbo/pnpm.
triggers:
  - monorepo management
  - turbo
  - pnpm workspace
  - package structure
  - api-client
  - monorepo orchestration
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Mapear topologia de apps e pacotes com responsabilidades claras.
  - step: 2
    action: Verificar que imports entre pacotes respeitam a API publica (index.ts).
  - step: 3
    action: Confirmar que logica de dados esta em api-client, nao em apps.
  - step: 4
    action: Padronizar pipelines de build, test e lint por escopo via turbo.
  - step: 5
    action: Monitorar tamanho de pacotes e dependencias circulares.
outputContract:
  - Mapa de pacotes/apps com ownership.
  - Regras de dependencia documentadas.
  - Pipeline turbo por escopo.
  - Relatorio de saude do monorepo.
