schemaVersion: 1.0.0
name: monorepo-frontend-governance
displayName: Monorepo Frontend Governance
description: Structure technical governance of monorepo frontend with Next.js 15+
  apps, React 19+ shared packages, boundaries of dependency, ownership, versioning
  and sustainable flow of delivery.
triggers:
- monorepo
- package boundaries
- frontend governance
- workspace architecture
- ownership
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
- step: 1
  action: Define monorepo topology and responsibilities for package/app.
- step: 2
  action: Establish rules of dependency and allowed imports.
- step: 3
  action: Formalize ownership, review and policy of changes.
- step: 4
  action: Padronizar pipelines of build, test and release by escopo.
- step: 5
  action: Monitor lead time, failures of integration and custo of maintenance.
outputContract:
- Mapa of apps/pacotes and ownership.
- Array of allowed dependencies.
- Rules of pipeline and release.
- Monorepo health metrics.
