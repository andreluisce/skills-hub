schemaVersion: 1.0.0
name: stakeholder-communication
displayName: Stakeholder Communication
description: >-
  Communicate technical and product decisions to non-technical stakeholders
  with clarity, empathy, and traceability through structured context,
  tradeoffs, recommendation, and required decision.
triggers:
  - stakeholder communication
  - decision memo
  - technical tradeoff
  - incident update
  - nonviolent communication
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Explain context and observable facts without judgment.
  - step: 2
    action: Show impact on users, operations, and timeline.
  - step: 3
    action: Present options with clear tradeoffs.
  - step: 4
    action: Recommend one option with objective rationale.
  - step: 5
    action: Request explicit decision, owner, and deadline.
outputContract:
  - Short executive summary.
  - Evaluated options and tradeoffs.
  - Recommendation and residual risk.
  - Pending decision and action owner.
