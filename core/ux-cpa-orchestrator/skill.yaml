schemaVersion: 1.0.0
name: ux-cpa-orchestrator
displayName: UX CPA Orchestrator
description: >-
  Skill master da Cognitive Product Architecture (CPA). Use para orquestrar
  analise completa de UX envolvendo cognicao, comportamento, UI, estrategia,
  etica e sustentabilidade.
triggers:
  - ux audit
  - ux analysis
  - ux orchestrator
  - cognitive product architecture
  - cpa
  - full ux review
stack:
  framework: Next.js 15+ App Router
  react: React 19+
  serverState: TanStack Query
  ui: shadcn/ui + Tailwind v4
  workspace: Monorepo (apps + packages)
workflow:
  - step: 1
    action: Diagnostico cognitivo com ux-cognitive-architecture.
  - step: 2
    action: Mapeamento de loop comportamental com ux-behavioral-loop.
  - step: 3
    action: Correcao de sistema visual com ux-visual-systems.
  - step: 4
    action: Plano de experimento com ux-lean-experimentation.
  - step: 5
    action: Gate etico com ux-ethics-bias e gate de sustentabilidade com ux-sustainable-product.
  - step: 6
    action: Narrativa para stakeholders com ux-emotional-stakeholder.
outputContract:
  - Problema sintetizado.
  - Diagnostico por camada (cognitiva, visual, comportamental).
  - Plano de mudanca priorizado (P0/P1/P2).
  - Hipoteses e metricas de validacao.
  - Riscos eticos e mitigacoes.
  - Script de comunicacao para stakeholders.
